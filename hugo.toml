# 基础配置
baseURL = "https://tsugihagidake.github.io/"
languageCode = "zh-cn"
title = "出口は直ぐ其処"
theme = "hugo-theme-stack"
paginate = 5
enableRobotsTXT = true
enableEmoji = true

# 导航菜单
[menu]
[[menu.main]]
identifier = "home"
name = "首页"
url = "/"
weight = 1
[[menu.main]]
identifier = "archives"
name = "归档"
url = "/archives/"
weight = 2
[[menu.main]]
identifier = "tags"
name = "标签"
url = "/tags/"
weight = 3
[[menu.main]]
identifier = "about"
name = "关于"
url = "/about/"
weight = 4

# 核心配置
[params]
featuredImageField = "image"  # 告诉主题：封面字段是image
author = "出口は直ぐ其処"
description = "You found me"
keywords = "博客,Hugo,技术,生活"
defaultTheme = "auto"

# 侧边栏配置（头像100%生效）
[params.sidebar]
emoji = "🤔"
subtitle = "你知道吗，这行字在头像下面哦~我去不早说！（能不能说点大家不知道的）"
avatar = "https://avatars.githubusercontent.com/tsugihagidake"
left = ["profile", "social", "recent"]

# 关于我组件
[params.widgets.about]
enable = true
title = "关于我"
description = "You found me"

# 社交链接
[params.social]
github = "tsugihagidake"

